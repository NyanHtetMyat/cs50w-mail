{% extends "mail/layout.html" %}
{% load static %}

{% block body %}


    <aside class="sidebar border-end">
        <h3>Email</h3>
        <ul class="nav-items p-0">
            <li class="nav-item border-red">
                <img class="nav-icon border-blue" src="{% static 'mail/email.svg' %}">
                <button class="nav-btn border-green" id="inbox">Inbox</button>
            </li>
            <li class="nav-item">
                <img class="nav-icon border-blue" src="{% static 'mail/email.svg' %}">
                <button class="nav-btn" id="compose">Compose</button>
            </li>
            <li class="nav-item">
                <img class="nav-icon border-blue" src="{% static 'mail/email.svg' %}">
                <button class="nav-btn" id="sent">Sent</button>
            </li>
            <li class="nav-item">
                <img class="nav-icon border-blue" src="{% static 'mail/email.svg' %}">
                <button class="nav-btn" id="archived">Archived</button>
            </li>
            <li class="nav-item">
                <img class="nav-icon border-blue" src="{% static 'mail/email.svg' %}">
                <a class="nav-btn" href="{% url 'logout' %}">Logout</a>
            </li>
        </ul>
    </aside>

    <header class="header">
        <div id="email-box-title"></div>
        
        <h2>{{ request.user.email }}</h2>
    </header>

    <main class="main container-fluid">

        <div id="emails-view">
        </div>

        <div id="compose-view">
            <form id="compose-form">
                <div class="form-group">
                    From: <input disabled class="form-control" value="{{ request.user.email }}">
                </div>
                <div class="form-group">
                    To: <input id="compose-recipients" class="form-control">
                </div>
                <div class="form-group">
                    <input class="form-control" id="compose-subject" placeholder="Subject">
                </div>
                <textarea class="form-control" id="compose-body" placeholder="Body"></textarea>
                <input type="submit" class="btn btn-primary"/>
            </form>
        </div>

    </main>

{% endblock %}

{% block script %}
    <script src="{% static 'mail/inbox.js' %}"></script>
{% endblock %}
